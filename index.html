<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高中段考學習策略診斷</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b1120;--card:#131c2e;--card2:#1a2540;--accent:#00c4a7;--accent2:#6c63ff;--warm:#f4a261;--text:#e8edf5;--muted:#7a8ba3;--border:#1f2d45;--low:#ef4444;--high:#00c4a7;--r:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.screen{display:none;min-height:100vh;padding:20px}
.screen.active{display:flex;flex-direction:column}

/* WELCOME */
#s-welcome{align-items:center;justify-content:center;text-align:center;padding:40px 24px;background:radial-gradient(ellipse at 50% 0%,#1a2540 0%,var(--bg) 70%)}
.logo-icon{font-size:56px;margin-bottom:16px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.title-main{font-family:'Outfit',sans-serif;font-size:clamp(24px,6vw,36px);font-weight:800;line-height:1.2;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.title-sub{font-size:15px;color:var(--muted);margin-bottom:28px;line-height:1.6}
.info-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:380px;margin-bottom:28px}
.info-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 12px;text-align:center}
.info-card .num{font-family:'Outfit',sans-serif;font-size:28px;font-weight:800;color:var(--accent)}
.info-card .lbl{font-size:12px;color:var(--muted);margin-top:4px}

/* Student info form */
.student-form{width:100%;max-width:380px;margin-bottom:20px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-group{display:flex;flex-direction:column;gap:6px;text-align:left}
.form-group label{font-size:13px;color:var(--muted);font-weight:500}
.form-group input{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:14px;font-family:'Noto Sans TC',sans-serif;outline:none;transition:border-color .2s}
.form-group input:focus{border-color:var(--accent)}
.form-group input::placeholder{color:rgba(122,139,163,.5)}
.req{color:#ef4444;font-size:13px}
.opt{color:var(--muted);font-size:11px;font-weight:400}
.form-error{color:#ef4444;font-size:13px;margin-top:8px;text-align:center;padding:8px;background:rgba(239,68,68,.1);border-radius:8px}
.req-err{border-color:#ef4444!important;background:rgba(239,68,68,.06)!important}
.page-progress{font-size:12px;color:var(--muted);margin-left:8px}
.page-progress.complete{color:var(--accent);font-weight:600}
.page-err-msg{display:none;color:#ef4444;font-size:13px;text-align:center;padding:8px 12px;background:rgba(239,68,68,.08);border-radius:8px;margin:8px 16px 0}
.admin-section h4{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--muted)}
.locked-class{padding:10px 14px;background:var(--card2);border:1px solid var(--border);border-radius:8px;font-size:15px;font-weight:600;color:var(--accent);letter-spacing:.02em}
.completed-notice{background:rgba(0,196,167,.1);border:1px solid rgba(0,196,167,.3);border-radius:8px;padding:12px 16px;font-size:13px;color:var(--accent);text-align:center;margin-bottom:16px}
.bg-vars{background:var(--card2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-top:10px}
.bg-title{font-size:12px;color:var(--muted);margin-bottom:12px;letter-spacing:.02em}
.bg-group{margin-bottom:12px}
.bg-group:last-child{margin-bottom:0}
.bg-label{font-size:13px;color:var(--text);margin-bottom:6px;font-weight:500}
.bg-opts{display:flex;flex-wrap:wrap;gap:6px}
.bg-btn{padding:5px 13px;background:var(--card);border:1px solid var(--border);border-radius:20px;color:var(--muted);font-size:13px;cursor:pointer;transition:all .15s;white-space:nowrap}
.bg-btn.selected{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-start{width:100%;max-width:380px;padding:18px;background:linear-gradient(135deg,var(--accent),#00a88e);border:none;border-radius:var(--r);color:#fff;font-size:17px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .2s}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,196,167,.3)}
.note{font-size:12px;color:var(--muted);margin-top:12px;line-height:1.6}

/* DIM SCREENS */
#s-dims{padding:0;flex-direction:column}
.dim-header{padding:16px 20px 0;position:sticky;top:0;background:var(--bg);z-index:10;padding-bottom:14px}
.progress-bar-wrap{height:4px;background:var(--border);border-radius:4px;margin-bottom:12px}
.progress-bar-fill{height:4px;border-radius:4px;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width .4s ease}
.step-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.step-text{font-size:13px;color:var(--muted)}
.cat-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600}
.cat-cognitive{background:#1a2a4a;color:#60a5fa}
.cat-strategy{background:#1a3a2a;color:#4ade80}
.cat-motivation{background:#3a1a2a;color:#f472b6}

.dim-content{flex:1;padding:0 20px 20px;overflow-y:auto}
.dim-hero{display:flex;align-items:center;gap:14px;margin-bottom:22px}
.dim-icon{font-size:38px}
.dim-name{font-family:'Outfit',sans-serif;font-size:24px;font-weight:800}
.dim-subtitle{font-size:13px;color:var(--muted)}

.slider-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:14px}
.slider-label{font-size:15px;font-weight:700;margin-bottom:4px}
.slider-desc{font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.5}
.scale-btns{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:8px}
.scale-btn{background:var(--card2);border:1.5px solid var(--border);border-radius:8px;padding:11px 0;font-family:'Outfit',sans-serif;font-size:16px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .18s;text-align:center;-webkit-tap-highlight-color:transparent}
.scale-btn:active{transform:scale(.93)}
.scale-btn.active{color:#fff;font-weight:800;border-color:transparent}
.scale-btn-labels{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.28);font-family:'Noto Sans TC',sans-serif}

.dim-nav{display:flex;gap:12px;padding:14px 20px;position:sticky;bottom:0;background:var(--bg);border-top:1px solid var(--border)}
.btn-nav{flex:1;padding:15px;border:none;border-radius:var(--r);font-size:15px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .2s}
.btn-back-nav{background:var(--card);color:var(--muted);border:1px solid var(--border)}
.btn-back-nav:hover{background:var(--card2)}
.btn-next-nav{background:linear-gradient(135deg,var(--accent2),#8b5cf6);color:#fff}
.btn-next-nav:hover{opacity:.9;transform:translateY(-1px)}

/* RESULTS */
#s-results{padding:0}
.results-scroll{padding:20px}
.results-header{text-align:center;padding:28px 20px 24px;background:linear-gradient(180deg,var(--card2) 0%,transparent 100%);margin-bottom:4px}
.student-badge{font-size:14px;color:var(--muted);margin-bottom:12px}
.results-title{font-family:'Outfit',sans-serif;font-size:18px;font-weight:800;color:var(--muted);letter-spacing:2px;margin-bottom:14px}
.score-big{font-family:'Outfit',sans-serif;font-size:72px;font-weight:800;line-height:1;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.score-max{font-size:20px;color:var(--muted);font-family:'Outfit',sans-serif}
.score-tag{display:inline-block;padding:6px 18px;border-radius:20px;font-size:14px;font-weight:700;margin-top:12px}

/* Reliability */
.reliability-bar{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin:12px 0}
.rel-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.rel-text{font-size:14px;color:var(--text)}
.rel-sub{font-size:12px;color:var(--muted);margin-top:2px}

/* Radar */
.radar-section{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:16px}
.section-title{font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.radar-wrap{display:flex;justify-content:center}

/* Category cards */
.cat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:22px;margin-bottom:14px}
.cat-card-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.cat-icon{font-size:28px}
.cat-type-name{font-family:'Outfit',sans-serif;font-size:19px;font-weight:800}
.cat-score-line{font-size:13px;color:var(--muted);margin-top:2px}
.cat-desc{font-size:16px;color:var(--text);line-height:1.75;margin-bottom:12px}
.cat-suggestion{background:var(--card2);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:14px 16px;font-size:15px;line-height:1.7;margin-bottom:10px}
.theory-text{font-size:13px;color:var(--muted);line-height:1.6;font-style:italic}

/* Dim bars */
.dim-bars{margin-top:14px}
.dim-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.dim-bar-label{font-size:13px;color:var(--muted);min-width:65px}
.dim-bar-wrap{flex:1;height:7px;background:var(--border);border-radius:6px;overflow:hidden}
.dim-bar-fill{height:7px;border-radius:6px;transition:width 1s ease}
.dim-bar-val{font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;min-width:35px;text-align:right;color:var(--accent)}

/* Weakest dim */
.weakest-section{background:rgba(108,99,255,.06);border:1px solid rgba(108,99,255,.2);border-radius:var(--r);padding:20px;margin-top:16px}
.weakest-tag{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;margin-bottom:12px}
.weakest-dim-name{font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;margin-bottom:6px}
.weakest-desc{font-size:15px;color:var(--muted);line-height:1.7;margin-bottom:14px}
.sug-label{font-size:12px;font-weight:700;letter-spacing:1px;margin-bottom:6px}
.sug-text{background:var(--card);border-radius:8px;padding:13px 15px;font-size:15px;line-height:1.7;margin-bottom:10px}
.sug-text.adv{border:1px solid rgba(108,99,255,.25)}
.theory-block{background:rgba(0,196,167,.05);border-radius:8px;padding:13px 15px;font-size:13px;color:var(--muted);line-height:1.6;font-style:italic}

/* Low score notice */
.all-low-notice{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:14px 16px;margin-bottom:14px;font-size:14px;line-height:1.6;color:rgba(252,165,165,.9)}

/* Subject section */
.subject-section{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:22px;margin-bottom:14px}
.subject-section-title{font-size:17px;font-weight:700;margin-bottom:6px}
.subject-section-sub{font-size:14px;color:var(--muted);margin-bottom:18px;line-height:1.5}
.subject-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.subject-card{background:var(--card2);border:2px solid var(--border);border-radius:12px;padding:18px 12px;text-align:center;cursor:pointer;transition:all .2s}
.subject-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.subject-card.selected{border-color:var(--accent);background:rgba(0,196,167,.08)}
.subject-card.wide{grid-column:1/-1}
.subject-emoji{font-size:28px;margin-bottom:6px}
.subject-name{font-size:15px;font-weight:700}
.subject-hint{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4}

/* Subject results */
.subject-results{margin-top:16px}
.subject-result-card{background:rgba(0,196,167,.06);border:1px solid rgba(0,196,167,.25);border-radius:var(--r);padding:20px;margin-bottom:12px}
.sub-dim-title{font-size:14px;font-weight:700;color:var(--accent);letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.action-card{border-radius:10px;padding:14px 16px;margin-bottom:10px}
.action-card.immediate{background:rgba(0,196,167,.08);border:1px solid rgba(0,196,167,.2)}
.action-card.longterm{background:rgba(108,99,255,.08);border:1px solid rgba(108,99,255,.2)}
.action-label{font-size:12px;font-weight:700;letter-spacing:1px;margin-bottom:6px}
.action-label.im{color:var(--accent)}
.action-label.lt{color:#a78bfa}
.action-text{font-size:15px;line-height:1.7}

/* Buttons */
.results-actions{display:flex;flex-direction:column;gap:10px;margin-top:8px;margin-bottom:36px}
.btn-submit{width:100%;padding:16px;background:linear-gradient(135deg,var(--accent),#00a88e);border:none;border-radius:var(--r);color:#fff;font-size:16px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .2s}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,196,167,.3)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-restart{width:100%;padding:14px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);color:var(--muted);font-size:14px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .2s}
.btn-restart:hover{background:var(--card2);color:var(--text)}
.submit-note{font-size:12px;color:var(--muted);text-align:center;line-height:1.5}

/* Google Sheets setup notice */
.sheets-notice{background:rgba(108,99,255,.08);border:1px dashed rgba(108,99,255,.3);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--muted);margin-bottom:10px;line-height:1.6}

.screen{animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* Backend detail panel */
.backend-detail{background:rgba(108,99,255,.05);border:1px dashed rgba(108,99,255,.25);border-radius:var(--r);margin-top:8px;margin-bottom:16px}
.backend-detail summary{padding:14px 18px;cursor:pointer;font-size:13px;font-weight:700;color:var(--muted);user-select:none;list-style:none;display:flex;align-items:center;gap:6px}
.backend-detail summary::-webkit-details-marker{display:none}
.backend-detail[open] summary{border-bottom:1px solid rgba(108,99,255,.15);color:var(--text)}
.backend-body{padding:6px 18px 14px}
.backend-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:14px}
.backend-row:last-child{border-bottom:none!important}
.backend-row .bl{color:var(--muted);font-size:13px}
.backend-row .bv{font-weight:700;font-family:'Outfit',sans-serif;font-size:14px}
.backend-summary-row{background:rgba(108,99,255,.08);border-radius:10px;padding:12px 14px;margin-top:8px;display:flex;justify-content:space-between;align-items:center}
.backend-summary-row.warn{background:rgba(245,158,11,.1)}
.backend-summary-row.danger{background:rgba(239,68,68,.1)}
.bsum-label{font-size:12px;font-weight:700;letter-spacing:1px;color:var(--muted)}
.bsum-val{font-size:15px;font-weight:800}
</style>
</head>
<body>

<!-- WELCOME -->
<div id="s-welcome" class="screen active" style="position:relative">
  <div class="logo-icon">🎯</div>
  <div class="title-main">學習策略診斷</div>
  <div class="title-sub">根據最近一次段考的學習過程進行評分<br>找出你最需要加強的地方</div>
  <div class="info-cards">
    <div class="info-card"><div class="num">9</div><div class="lbl">學習向度</div></div>
    <div class="info-card"><div class="num">33</div><div class="lbl">評估題目</div></div>
    <div class="info-card"><div class="num">5</div><div class="lbl">學科領域</div></div>
    <div class="info-card"><div class="num">12</div><div class="lbl">分鐘完成</div></div>
  </div>

  <div id="welcome-loading" class="welcome-loading">名單載入中，請稍候...</div>

  <div id="welcome-form" class="student-form" style="display:none">
    <div class="form-row">
      <div class="form-group">
        <label>班級</label>
        <div class="locked-class" id="display-class"></div>
      </div>
      <div class="form-group">
        <label>座號 <span class="req">*</span></label>
        <input type="text" id="inp-seat" placeholder="請輸入座號">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>姓名 <span class="req">*</span></label>
        <input type="text" id="inp-name" placeholder="請輸入姓名">
      </div>
      <div class="form-group">
        <label>電子信箱 <span class="req">*</span></label>
        <input type="email" id="inp-email" placeholder="your@email.com">
      </div>
    </div>
    <div id="form-error" class="form-error" style="display:none"></div>
    <div class="bg-vars">
      <div class="bg-title">學習背景（性別必填，其餘快速點選即可）</div>
      <div class="bg-group">
        <div class="bg-label">性別 <span class="req">*</span></div>
        <div class="bg-opts" id="bg-gender">
          <button class="bg-btn" onclick="selectBg('gender','M',this)">生理男</button>
          <button class="bg-btn" onclick="selectBg('gender','F',this)">生理女</button>
        </div>
      </div>
      <div class="bg-group">
        <div class="bg-label">每天大約讀幾小時書？</div>
        <div class="bg-opts" id="bg-studyHours">
          <button class="bg-btn" onclick="selectBg('studyHours','lt1h',this)">不到1小時</button>
          <button class="bg-btn" onclick="selectBg('studyHours','1-2h',this)">1-2小時</button>
          <button class="bg-btn" onclick="selectBg('studyHours','2-3h',this)">2-3小時</button>
          <button class="bg-btn" onclick="selectBg('studyHours','gt3h',this)">3小時以上</button>
        </div>
      </div>
      <div class="bg-group">
        <div class="bg-label">平均每天睡幾小時？</div>
        <div class="bg-opts" id="bg-sleep">
          <button class="bg-btn" onclick="selectBg('sleep','lt6h',this)">不到6小時</button>
          <button class="bg-btn" onclick="selectBg('sleep','6-7h',this)">6-7小時</button>
          <button class="bg-btn" onclick="selectBg('sleep','7-8h',this)">7-8小時</button>
          <button class="bg-btn" onclick="selectBg('sleep','gt8h',this)">8小時以上</button>
        </div>
      </div>
      <div class="bg-group">
        <div class="bg-label">上次段考你大概幾天前開始準備？</div>
        <div class="bg-opts" id="bg-prepTime">
          <button class="bg-btn" onclick="selectBg('prepTime','7+',this)">1週以上</button>
          <button class="bg-btn" onclick="selectBg('prepTime','4-6d',this)">4-6天</button>
          <button class="bg-btn" onclick="selectBg('prepTime','2-3d',this)">2-3天</button>
          <button class="bg-btn" onclick="selectBg('prepTime','1d',this)">前一天才念</button>
        </div>
      </div>
      <div class="bg-group">
        <div class="bg-label">學習帶給你的壓力有多大？</div>
        <div class="bg-opts" id="bg-stress">
          <button class="bg-btn" onclick="selectBg('stress','1',this)">完全沒有</button>
          <button class="bg-btn" onclick="selectBg('stress','2',this)">有一點</button>
          <button class="bg-btn" onclick="selectBg('stress','3',this)">普通</button>
          <button class="bg-btn" onclick="selectBg('stress','4',this)">蠻大的</button>
          <button class="bg-btn" onclick="selectBg('stress','5',this)">壓力很大</button>
        </div>
      </div>
    </div>

  <button class="btn-start" id="btn-start" onclick="startAssessment()" style="display:none">開始診斷 →</button>
  <div class="note" id="welcome-note" style="display:none">請根據實際情況誠實填寫，誠實作答才能得到最有用的建議</div>
  <div style="margin-top:28px">
    <button onclick="window.open('admin.html','_blank')" style="background:rgba(0,196,167,.12);border:1px solid rgba(0,196,167,.5);color:var(--accent);font-size:13px;font-weight:500;cursor:pointer;padding:7px 18px;border-radius:20px">管理員入口</button>
  </div>
</div>

<!-- DIM SCREENS -->
<div id="s-dims" class="screen">

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const target=document.getElementById(id);
  if(!target){
    document.body.insertAdjacentHTML('beforeend',
      `<div style="position:fixed;top:0;left:0;right:0;background:red;color:#fff;font-size:20px;padding:20px;z-index:9999">
        錯誤：找不到 screen "${id}"
      </div>`);
    return;
  }
  target.classList.add('active');
  window.scrollTo(0,0);
  if(id==='s-dims'){
    setTimeout(()=>{
      const dc=document.getElementById('dim-content');
      if(!dc||!dc.innerHTML.trim()){
        document.body.insertAdjacentHTML('beforeend',
          `<div style="position:fixed;top:0;left:0;right:0;background:red;color:#fff;font-size:20px;padding:20px;z-index:9999">
            診斷：dim-content 是空的（renderDimScreen 未寫入）
          </div>`);
      }
    },200);
  }
}

async function fetchActiveClass(){
  try{
    const res=await fetch(SHEET_URL+'?action=getActiveClass');
    const data=await res.json();
    if(data.activeClass){
      document.getElementById('display-class').textContent=data.activeClass;
      state._activeClass=data.activeClass;
      document.getElementById('welcome-loading').style.display='none';
      document.getElementById('welcome-form').style.display='block';
      document.getElementById('btn-start').style.display='block';
      document.getElementById('welcome-note').style.display='block';
    }else{
      document.getElementById('welcome-loading').textContent='今日尚未開放施測，請詢問老師';
    }
  }catch(e){
    document.getElementById('welcome-loading').textContent='連線失敗，請重新整理頁面';
  }
}

async function startAssessment(){
  const cls  =state._activeClass||'';
  const seat =document.getElementById('inp-seat').value.trim();
  const name =document.getElementById('inp-name').value.trim();
  const email=document.getElementById('inp-email').value.trim();
  const err  =document.getElementById('form-error');
  if(!seat||!name){
    err.textContent='請填寫座號與姓名';err.style.display='block';return;
  }
  if(!email||!email.includes('@')){
    err.textContent='電子信箱為必填，請輸入有效 email';err.style.display='block';return;
  }
  if(!state.bg_gender){
    err.textContent='請選擇性別';err.style.display='block';
    document.getElementById('bg-gender')?.scrollIntoView({behavior:'smooth',block:'center'});
    return;
  }
  if(!state.bg_studyHours){
    err.textContent='請選擇每日讀書時數';err.style.display='block';
    document.getElementById('bg-studyHours')?.scrollIntoView({behavior:'smooth',block:'center'});
    return;
  }
  if(!state.bg_sleep){
    err.textContent='請選擇睡眠時數';err.style.display='block';
    document.getElementById('bg-sleep')?.scrollIntoView({behavior:'smooth',block:'center'});
    return;
  }
  if(!state.bg_prepTime){
    err.textContent='請選擇考前準備時間';err.style.display='block';
    document.getElementById('bg-prepTime')?.scrollIntoView({behavior:'smooth',block:'center'});
    return;
  }
  if(!state.bg_stress){
    err.textContent='請選擇學習壓力程度';err.style.display='block';
    document.getElementById('bg-stress')?.scrollIntoView({behavior:'smooth',block:'center'});
    return;
  }
  err.style.display='none';
  const btn=document.getElementById('btn-start');
  btn.disabled=true;btn.textContent='查詢中...';
  try{
    const res=await fetch(SHEET_URL+'?action=check&class='+encodeURIComponent(cls)+'&seat='+encodeURIComponent(seat));
    const result=await res.json();
    if(result.found){
      state.studentName=result.data.name;state.studentClass=result.data.class;
      state.studentSeat=result.data.seat;state.studentEmail=result.data.email;
      showReadonlyResults(result.data);
    }else{
      state.studentName=name;state.studentClass=cls;
      state.studentSeat=seat;state.studentEmail=email;
      state.step=0;renderDimScreen();showScreen('s-dims');
    }
  }catch(e){
    // API 失敗時仍允許作答，顯示錯誤供診斷
    err.textContent='連線錯誤（仍可作答）：'+e.message;
    err.style.display='block';
    state.studentName=name;state.studentClass=cls;
    state.studentSeat=seat;state.studentEmail=email;
    state.step=0;renderDimScreen();showScreen('s-dims');
  }finally{btn.disabled=false;btn.textContent='開始診斷 →';}
}

function goNext(){
  const dim=DIMENSIONS[state.step];
  // 清除舊錯誤
  document.querySelectorAll('.req-err').forEach(c=>c.classList.remove('req-err'));
  const errMsg=document.getElementById('page-err-msg');
  errMsg.style.display='none';
  // 驗證每題必填（計分題）
  const unanswered=dim.items.map((_,i)=>i).filter(i=>state.scores[dim.id][i]===null);
  // 驗證當前 step 的 C 題
  const cItems=Object.entries(CONSISTENCY_ITEMS).filter(([,ci])=>ci.step===state.step);
  const unansweredC=cItems.filter(([key])=>state.consistency[key]===null);
  const totalMissing=unanswered.length+unansweredC.length;
  if(totalMissing>0){
    errMsg.textContent=`還有 ${totalMissing} 題尚未填答，請填完再繼續`;
    errMsg.style.display='block';
    unanswered.forEach(i=>{
      document.getElementById(`btns-${dim.id}-${i}`)?.closest('.slider-card')?.classList.add('req-err');
    });
    unansweredC.forEach(([key])=>{
      document.getElementById(`btns-c-${key}`)?.closest('.slider-card')?.classList.add('req-err');
    });
    // 捲到第一題未填（計分題優先，否則 C 題）
    const firstMissId=unanswered.length>0
      ?`btns-${dim.id}-${unanswered[0]}`
      :`btns-c-${unansweredC[0][0]}`;
    document.getElementById(firstMissId)?.scrollIntoView({behavior:'smooth',block:'center'});
    refreshButtonStyles(); // 確保已填題目視覺狀態不被清除
    return;
  }
  saveCurrentScores();
  if(state.step<8){state.step++;renderDimScreen();document.getElementById('dim-content').scrollTop=0;}
  else{
    _dataSubmitted=false;
    showResults();
    if(SHEET_URL) setTimeout(()=>{if(!_dataSubmitted){_emailSent=true;submitData();}},45000);
  }
}

function goBack(){
  if(state.step>0){state.step--;renderDimScreen();document.getElementById('dim-content').scrollTop=0;}
  else{showScreen('s-welcome');}
}

function getEffScore(dimId,itemIdx){
  const dim=DIMENSIONS.find(d=>d.id===dimId);
  const raw=state.scores[dimId][itemIdx]??0;
  return dim.items[itemIdx].reverse ? 5-raw : raw;
}

function dimScore(id){
  const dim=DIMENSIONS.find(d=>d.id===id);
  return dim.items.reduce((sum,_,i)=>sum+getEffScore(id,i),0);
}

function catScore(cat){
  return DIMENSIONS.filter(d=>d.cat===cat).reduce((sum,d)=>sum+dimScore(d.id),0);
}

function totalScore(){return DIMENSIONS.reduce((sum,d)=>sum+dimScore(d.id),0);}

function getLevel(score){
  if(score<=5) return 'low';
  if(score<=10) return 'mid';
  return 'high';
}

function getCatType(cat){
  const s=catScore(cat);
  return CAT_TYPES[cat].find(t=>s>=t.min&&s<=t.max);
}

function getWeakest(cat){
  const dims=DIMENSIONS.filter(d=>d.cat===cat);
  return dims.reduce((w,d)=>dimScore(d.id)<dimScore(w.id)?d:w);
}

function isAllLow(cat){
  return DIMENSIONS.filter(d=>d.cat===cat).every(d=>dimScore(d.id)<=5);
}

function getWeakLabel(score){
  if(score<=5) return {label:'⚡ 最需要加強',color:'#ef4444',bg:'rgba(239,68,68,.15)'};
  if(score<=10) return {label:'📌 重點發展',color:'#f59e0b',bg:'rgba(245,158,11,.15)'};
  return {label:'🚀 精進方向',color:'#00c4a7',bg:'rgba(0,196,167,.15)'};
}

function getTag(total){
  const p=total/135;
  if(p<0.2) return{text:'需要全面提升',color:'#ef4444',bg:'rgba(239,68,68,.15)'};
  if(p<0.4) return{text:'積極建立中',color:'#f97316',bg:'rgba(249,115,22,.15)'};
  if(p<0.6) return{text:'穩定成長中',color:'#eab308',bg:'rgba(234,179,8,.15)'};
  if(p<0.8) return{text:'表現良好',color:'#84cc16',bg:'rgba(132,204,22,.15)'};
  return{text:'學習高手',color:'#00c4a7',bg:'rgba(0,196,167,.15)'};
}

// ═══════════════════════════════════════
// RELIABILITY
// ═══════════════════════════════════════
function calcReliability(){
  const raw=[],eff=[];
  DIMENSIONS.forEach(dim=>{
    dim.items.forEach((_,i)=>{
      raw.push(state.scores[dim.id][i]);
      eff.push(getEffScore(dim.id,i));
    });
  });
  const mean=eff.reduce((a,b)=>a+b,0)/eff.length;
  const sd=Math.sqrt(eff.reduce((s,x)=>s+Math.pow(x-mean,2),0)/eff.length);
  const answeredRaw=raw.filter(v=>v!==null);
  const allSame=answeredRaw.length>0&&new Set(answeredRaw).size===1;
  // Check reverse item inconsistency
  let reverseFlags=0;
  DIMENSIONS.forEach(dim=>{
    dim.items.forEach((item,i)=>{
      if(item.reverse){
        const forwardAvg=dim.items.filter((_,j)=>j!==i).reduce((_,jj,j2)=>_+state.scores[dim.id][dim.items.findIndex((x,fi)=>fi!==i&&fi===j2)],0);
        // Simpler: compare raw reverse with dim forward average
        const fwdScores=dim.items.map((_,j)=>j===i?null:state.scores[dim.id][j]).filter(v=>v!==null);
        const fwdAvg=fwdScores.length?fwdScores.reduce((a,b)=>a+b,0)/fwdScores.length:0;
        const reverseRaw=state.scores[dim.id][i];
        // 正向高＋反向原始值也高（說正向好，卻也說有負面問題）→ 矛盾
        // 正向低＋反向原始值也低（說正向差，卻說沒有負面問題）→ 矛盾
        if(reverseRaw!==null){
          if(fwdAvg>=4 && reverseRaw>=4) reverseFlags++;
          if(fwdAvg<=1 && reverseRaw<=1) reverseFlags++;
        }
      }
    });
  });
  let flag='normal',flagReason='',color='#00c4a7',dot='🟢';
  if(allSame){flag='high_risk';flagReason='所有題目填相同分數';color='#ef4444';dot='🔴';}
  else if(sd<0.6){flag='high_risk';flagReason='作答集中，可能未認真評估';color='#ef4444';dot='🔴';}
  else if(reverseFlags>=2){flag='medium_risk';flagReason='部分反向題前後不一致';color='#f59e0b';dot='🟡';}
  else if(sd<0.9){flag='low_risk';flagReason='作答略為集中，請留意';color='#f59e0b';dot='🟡';}
  // C 一致性配對題差距檢核
  let consFlags=0,consDetails=[];
  Object.entries(CONSISTENCY_PAIRS).forEach(([pair,[keyA,keyB]])=>{
    const diff=Math.abs((state.consistency[keyA]??0)-(state.consistency[keyB]??0));
    if(diff>=CONSISTENCY_THRESH){consFlags++;consDetails.push(pair+'差距'+diff+'分');}
  });
  if(consFlags>=2&&flag==='normal'){flag='medium_risk';flagReason='多組一致性配對題差距過大';color='#f59e0b';dot='🟡';}
  return{sd:sd.toFixed(2),flag,flagReason,color,dot,reverseFlags,consFlags,consDetails};
}

// RADAR (Triangle)
// ═══════════════════════════════════════
function buildRadar(){
  const cx=200,cy=175,r=130;
  const cats=['cognitive','strategy','motivation'];
  const angles=[-90,150,30];
  const names=['認知能力','學習策略','學習動機'];
  const colors=['#60a5fa','#4ade80','#f472b6'];
  const pts=cats.map((cat,i)=>{
    const ang=angles[i]*Math.PI/180;
    const pct=catScore(cat)/45;
    return{x:cx+r*pct*Math.cos(ang),y:cy+r*pct*Math.sin(ang)};
  });
  const gp=(p)=>cats.map((_,i)=>{
    const ang=angles[i]*Math.PI/180;
    return`${cx+r*p*Math.cos(ang)},${cy+r*p*Math.sin(ang)}`;
  }).join(' ');
  return`<svg class="radar" width="400" height="360" viewBox="0 0 400 360">
    ${[.25,.5,.75,1].map(p=>`<polygon points="${gp(p)}" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>`).join('')}
    ${cats.map((_,i)=>{const ang=angles[i]*Math.PI/180;return`<line x1="${cx}" y1="${cy}" x2="${cx+r*Math.cos(ang)}" y2="${cy+r*Math.sin(ang)}" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>`;}).join('')}
    <polygon points="${pts.map(p=>`${p.x},${p.y}`).join(' ')}" fill="rgba(0,196,167,0.18)" stroke="#00c4a7" stroke-width="2"/>
    ${pts.map((p,i)=>`<circle cx="${p.x}" cy="${p.y}" r="6" fill="${colors[i]}"/>`).join('')}
    ${cats.map((_,i)=>{
      const ang=angles[i]*Math.PI/180;
      const lx=cx+(r+36)*Math.cos(ang),ly=cy+(r+36)*Math.sin(ang);
      return`<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" fill="${colors[i]}" font-size="14" font-weight="700" font-family="Outfit,sans-serif">${names[i]}</text>
      <text x="${lx}" y="${ly+18}" text-anchor="middle" dominant-baseline="middle" fill="rgba(255,255,255,0.45)" font-size="12" font-family="Outfit,sans-serif">${catScore(cats[i])}/45</text>`;
    }).join('')}
    <circle cx="${cx}" cy="${cy}" r="3" fill="rgba(255,255,255,0.25)"/>
  </svg>`;
}

async function submitData(){

  const rel=calcReliability();
  // ── 計算全量表最弱向度 ──
  const allDimIds=['memory','focus','understanding','notes','review','timemanage','motivation','goals','persistence'];
  const weakId=allDimIds.reduce((a,b)=>dimScore(a)<=dimScore(b)?a:b);
  const weakDim=DIMENSIONS.find(d=>d.id===weakId);
  const weakS=dimScore(weakId);
  const weakLv=getLevel(weakS);
  const weakContent=DIM_CONTENT[weakId]?.[weakLv]||{};
  const payload={
    timestamp:new Date().toLocaleString('zh-TW'),
    name:state.studentName,class:state.studentClass,seat:state.studentSeat,
    email:state.studentEmail,
    total:totalScore(),
    catCognitive:catScore('cognitive'),catStrategy:catScore('strategy'),catMotivation:catScore('motivation'),
    memory:dimScore('memory'),focus:dimScore('focus'),understanding:dimScore('understanding'),
    notes:dimScore('notes'),review:dimScore('review'),timemanage:dimScore('timemanage'),
    motivation:dimScore('motivation'),goals:dimScore('goals'),persistence:dimScore('persistence'),
    sd:rel.sd,reliabilityFlag:rel.flag,flagReason:rel.flagReason,
    C1a:state.consistency.C1a??0,C1b:state.consistency.C1b??0,
    C2a:state.consistency.C2a??0,C2b:state.consistency.C2b??0,
    C3a:state.consistency.C3a??0,C3b:state.consistency.C3b??0,
    consFlag:rel.consFlags||0,
    consDetail:rel.consDetails&&rel.consDetails.length?rel.consDetails.join('|'):'正常',
    subject:state.subject||'未選擇',
    subjectLog:state.subjectLog.join(','),
    bgGender:state.bg_gender||'未填',
    bgStudyHours:state.bg_studyHours||'未填',
    bgSleep:state.bg_sleep||'未填',
    bgPrepTime:state.bg_prepTime||'未填',
    bgStress:state.bg_stress||'未填',
    // 9 向度完整資料（供 Email 使用）
    dimDetails:JSON.stringify(DIMENSIONS.map(d=>{
      const s=dimScore(d.id),lv=getLevel(s),c=DIM_CONTENT[d.id]?.[lv]||{};
      return{name:d.name,score:s,level:lv,basic:c.basic||''};
    })),
    // 最弱向度資訊（供 Email 建議使用）
    weakDimName:weakDim?.name||'',
    weakDimScore:weakS,
    weakDimDesc:weakContent.desc||'',
    weakDimBasic:weakContent.basic||'',
    weakDimAdv:weakContent.adv||''
  };
  // 靜默送出（fire-and-forget）
  fetch(SHEET_URL,{method:'POST',body:JSON.stringify(payload),mode:'no-cors'}).catch(()=>{});
}

    container.querySelectorAll('.scale-btn').forEach((btn,v)=>{

  Object.entries(CONSISTENCY_ITEMS).filter(([,ci])=>ci.step===state.step).forEach(([key])=>{
    const val=state.consistency[key];
    const container=document.getElementById(`btns-c-${key}`);
    if(!container) return;

      btn.classList.toggle('active',val!==null&&v===val);
      btn.style.background=val!==null&&v===val?btnColor(v):'';

// ── 進度更新 ────────────────────────────────
function updatePageProgress(){
  const dim=DIMENSIONS[state.step];
  if(!dim) return;
  const cItems=Object.entries(CONSISTENCY_ITEMS).filter(([,ci])=>ci.step===state.step);
  const answeredScores=dim.items.filter((_,i)=>state.scores[dim.id][i]!==null).length;
  const answeredC=cItems.filter(([key])=>state.consistency[key]!==null).length;
  const total=dim.items.length+cItems.length;
  const answered=answeredScores+answeredC;
  const el=document.getElementById('page-progress');
  if(!el) return;
  el.textContent=`本頁 ${total} 題，已填 ${answered}/${total}`;
  el.classList.toggle('complete',answered===total);
}

  }

  document.getElementById('results-inner').innerHTML=html;
  showScreen('s-results');
  if(d.subject && d.subject!=='未選擇') renderSubjectResultsReadonly(d.subject,scores);
  }catch(e){
    // 唯讀模式失敗，fallback 讓學生重新填答
    console.error('showReadonlyResults error:',e);
    state.step=0;renderDimScreen();showScreen('s-dims');
  }
}

function renderSubjectResultsReadonly(sub,scores){
  const subData=SUBJECT_CONTENT[sub];if(!subData) return;
  const cats=['cognitive','strategy','motivation'];
  const catColors={cognitive:'var(--accent2)',strategy:'var(--accent)',motivation:'var(--warm)'};
  let html='<div class="subject-results">';
  cats.forEach(cat=>{
    const dimIds=DIMENSIONS.filter(d=>d.cat===cat).map(d=>d.id);
    const weakId=dimIds.reduce((a,b)=>scores[a]<=scores[b]?a:b);
    const sd=subData[weakId];if(!sd) return;
    const weakDim=DIMENSIONS.find(d=>d.id===weakId);
    html+=`<div class="subject-result-card">
      <div class="sub-dim-title" style="color:${catColors[cat]}">${weakDim?.icon||''} ${weakDim?.name} × ${subData.name}科</div>
      <div class="action-card immediate"><div class="action-label im">立即行動</div><div class="action-text">${sd.action}</div></div>
      <div class="action-card longterm"><div class="action-label lt">長期目標</div><div class="action-text">${sd.goal}</div></div>
    </div>`;
  });
  html+='</div>';
  const el=document.getElementById('subject-results-area');
  if(el) el.innerHTML=html;
}

let _adminPwd='';

        document.getElementById('admin-panel').style.display='block';
        fetch(SHEET_URL+'?action=getActiveClass')
          .then(r=>r.json())

function adminUnlock(){
  const cls=document.getElementById('admin-cls').value;
  const seat=document.getElementById('admin-seat').value.trim();
  const res=document.getElementById('admin-unlock-res');
  if(!cls||!seat){res.textContent='請選擇班級並填入座號';res.style.cssText='display:block;color:#f87171;font-size:13px;margin-top:8px;padding:6px 10px;background:rgba(239,68,68,.1);border-radius:6px';return;}
  fetch(SHEET_URL+'?action=unlock&class='+encodeURIComponent(cls)+'&seat='+encodeURIComponent(seat)+'&pwd='+encodeURIComponent(_adminPwd))
    .then(r=>r.json())
    .then(data=>{
      const ok=data.success&&data.deleted>0;
      res.textContent=data.success?(data.deleted>0?`已解鎖 ${cls} 座號 ${seat}`:'查無此學生紀錄'):'失敗：'+data.msg;
      res.style.cssText=`display:block;font-size:13px;margin-top:8px;padding:6px 10px;border-radius:6px;${ok?'background:rgba(0,196,167,.15);color:#00c4a7':'background:rgba(239,68,68,.1);color:#f87171'}`;
    })
    .catch(()=>{res.textContent='連線失敗';res.style.cssText='display:block;color:#f87171;font-size:13px;margin-top:8px';});
}

function adminLoadStatus(){
  const cls=document.getElementById('admin-status-cls').value;
  const res=document.getElementById('admin-status-res');
  if(!cls){res.innerHTML='';return;}
  res.innerHTML='<div style="color:#94a3b8;font-size:13px;padding:8px">載入中...</div>';
  fetch(SHEET_URL+'?action=getStatus&class='+encodeURIComponent(cls)+'&pwd='+encodeURIComponent(_adminPwd))
    .then(r=>r.json())
    .then(list=>{
      if(list.success===false){res.innerHTML=`<div style="color:#f87171;font-size:13px">${list.msg}</div>`;return;}
      const done=list.filter(s=>s.completed).length;
      res.innerHTML=`<div style="font-size:12px;color:#94a3b8;margin-bottom:8px">共 ${list.length} 人｜已填 <span style="color:#00c4a7;font-weight:700">${done}</span> 人｜未填 <span style="color:#f87171;font-weight:700">${list.length-done}</span> 人</div>`
        +list.map(s=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 8px;border-radius:6px;margin-bottom:3px;background:${s.completed?'rgba(0,196,167,.08)':'rgba(239,68,68,.06)'}">
          <span style="font-size:13px;color:#e2e8f0">${s.seat}號 ${s.name}</span>
          <span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;${s.completed?'background:rgba(0,196,167,.2);color:#00c4a7':'background:rgba(239,68,68,.15);color:#f87171'}">${s.completed?'已完成':'未填答'}</span>
        </div>`).join('');
    })
    .catch(()=>{res.innerHTML='<div style="color:#f87171;font-size:13px">連線失敗</div>';});
}

  ]);

function setupConditionalFormat() {
  const sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
  const lastCol = sheet.getMaxColumns();
  const rules = [];

  // 找「綜合異常評估」欄（第30欄，0-indexed=29）
  const anomalyCol = 30;

  // ⚠️ 高度可疑 → 淡紅
  const ruleRed = SpreadsheetApp.newConditionalFormatRule()
    .whenTextContains('高度')
    .setBackground('#fce8e6')
    .setRanges([sheet.getRange(2, 1, 1000, lastCol)])
    .build();

  // 🔍 輕度異常 → 淡黃
  const ruleYellow = SpreadsheetApp.newConditionalFormatRule()
    .whenTextContains('輕度')
    .setBackground('#fef9c3')
    .setRanges([sheet.getRange(2, anomalyCol, 1000, 1)])
    .build();

  sheet.setConditionalFormatRules([ruleRed, ruleYellow]);
  SpreadsheetApp.getUi().alert('條件格式設定完成！');
}
